---
tracker:
  kind: "github"
  api_key: $GITHUB_TOKEN
  owner: "taskdog-dev"
  repo: "taskdog"
  label: "taskdog"
  active_states: ["open"]
  terminal_states: ["closed"]

polling:
  interval_ms: 10000

workspace:
  root: "~/.taskdog/workspaces"
  git_clone_url: "https://github.com/taskdog-dev/taskdog.git"
  git_default_branch: "master"

agent:
  model: "sonnet"
  max_turns: 30
  stall_timeout_ms: 600000
  allowed_tools:
    - "Read"
    - "Write"
    - "Edit"
    - "Bash"
    - "Glob"
    - "Grep"

---

