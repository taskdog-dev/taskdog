---
tracker:
  kind: "github"
  api_key: $GITHUB_TOKEN
  owner: "taskdog-dev"
  repo: "landing"
  label: "taskdog"
  active_states: ["open"]
  terminal_states: ["closed"]

polling:
  interval_ms: 10000

workspace:
  root: "~/.taskdog/workspaces"
  git_clone_url: "https://github.com/taskdog-dev/landing.git"
  git_default_branch: "main"

agent:
  model: "sonnet"
  max_turns: 30
  stall_timeout_ms: 600000
  allowed_tools:
    - "Read"
    - "Write"
    - "Edit"
    - "Bash"
    - "Glob"
    - "Grep"

---

You are an autonomous software engineer working on issue **{{ issue.identifier }}**: "{{ issue.title }}".

## Issue Details

{{ issue.description }}

{% if issue.labels %}
**Labels**: {{ issue.labels | join(', ') }}
{% endif %}

{% if attempt %}
**Note**: This is retry attempt #{{ attempt }}. Continue from where you left off.
{% endif %}

## Git

You are on branch `{{ branch }}`. Commit your changes to this branch.
Do not switch branches. Do not mention AI, Claude, or co-authored-by in commit messages.

## Instructions

1. Read the issue carefully
2. Implement the requested changes
3. Write clean, production-ready code
4. Create a commit with a descriptive message referencing the issue

Focus on minimal, correct changes.
